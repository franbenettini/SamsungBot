name: Chequeo de stock - Barras de sonido Samsung

on:
  schedule:
    # Los horarios de cron son en UTC. Argentina está en UTC-3.
    # 12:00 ARG -> 15:00 UTC
    # 20:00 ARG -> 23:00 UTC
    - cron: "0 15 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch: {}  # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write  # necesario para poder commitear stock_state.json

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      - name: Chequear stock
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_stock.py

      - name: Guardar estado actualizado
        run: |
          git config user.name "stock-bot"
          git config user.email "stock-bot@users.noreply.github.com"
          git add stock_state.json
          git diff --quiet --cached || git commit -m "Actualiza estado de stock [skip ci]"

          # Reintenta el push si otra corrida pisó el remoto mientras tanto
          # (pasa si se dispara manualmente justo antes/después de la
          # corrida programada, o si dos corridas se solapan).
          for i in 1 2 3 4 5; do
            if git push; then
              break
            fi
            echo "Push rechazado, reintentando con git pull --rebase (intento $i)..."
            git pull --rebase --autostash
            sleep $((RANDOM % 5 + 1))
          done